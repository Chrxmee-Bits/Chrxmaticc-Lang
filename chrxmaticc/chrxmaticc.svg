<svg xmlns="http://w3.org" viewBox="0 0 500 500" width="100%" height="100%">
  <!-- Background is transparent: no wrapping rect element used -->
  <g transform="translate(250, 250)">
    <!-- Light Blue 'C' -->
    <path d="M 106,-106 
             A 150,150 0 1,0 106,106" 
          fill="none" 
          stroke="#4DABF7" 
          stroke-width="50" 
          stroke-linecap="square" />

    <!-- Extended White Arrow hitting the opening plane edge -->
    <g transform="translate(-150, 0)">
      <!-- Long Arrow Shaft -->
      <line x1="-30" y1="0" x2="230" y2="0" 
            stroke="#ffffff" 
            stroke-width="26" 
            stroke-linecap="square" />
      
      <!-- Arrow Head -->
      <path d="M 205,-25 L 230,0 L 205,25" 
            fill="none" 
            stroke="#ffffff" 
            stroke-width="26" 
            stroke-linecap="square" 
            stroke-linejoin="miter" />
    </g>
  </g>
</svg>
